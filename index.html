<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomBook</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const CLIENT_ID      = "491345627943-6d8s0f4k4c6hkhvqrks4v2lp1jvpfi7b.apps.googleusercontent.com";
const SCOPES         = "https://www.googleapis.com/auth/calendar.events email profile";
const CALENDAR_ID    = "c_9c2567754ac4e44e70a7eed42c314fade369d897910fd7fe34cab07c2eb76fbd@group.calendar.google.com";
const ALLOWED_DOMAIN = "useintegral.com";

// ── Cookie helpers ───────────────────────────────────────────────────────────
// Secure flag ensures cookie only travels over HTTPS, never plain HTTP
function setCookie(name, value, days) {
  const exp = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = `${name}=${encodeURIComponent(value)}; expires=${exp}; path=/; SameSite=Strict; Secure`;
}
function getCookie(name) {
  return document.cookie.split("; ").reduce((r, v) => {
    const [k, val] = v.split("=");
    return k === name ? decodeURIComponent(val) : r;
  }, null);
}
function deleteCookie(name) {
  document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; Secure`;
}

// ── Room & time config ───────────────────────────────────────────────────────
const ROOMS = [
  { id: "small-conf",   name: "Small Conference", capacity: 4,  amenities: ["TV", "Whiteboard", "Video Call"],                 color: "#6366f1", icon: "🪑" },
  { id: "large-conf",   name: "Large Conference", capacity: 10, amenities: ["Projector", "Whiteboard", "Video Call", "Phone"], color: "#0ea5e9", icon: "🏛️" },
  { id: "phone-booth",  name: "Phone Booth",       capacity: 1,  amenities: ["Phone", "Video Call"],                            color: "#10b981", icon: "📞" },
  { id: "small-office", name: "Small Office",      capacity: 1,  amenities: ["Desk", "Monitor"],                               color: "#f59e0b", icon: "🚪" },
];

const HOURS = (() => {
  const slots = []; let h = 9, m = 30;
  while (h < 18 || (h === 18 && m === 0)) {
    const label = h < 12 ? `${h}:${String(m).padStart(2,"0")} AM`
      : h === 12 ? `12:${String(m).padStart(2,"0")} PM`
      : `${h-12}:${String(m).padStart(2,"0")} PM`;
    slots.push({ value: `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`, label });
    m += 15; if (m === 60) { m = 0; h++; }
  }
  return slots;
})();

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split("T")[0]; }
function timeToMin(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function overlaps(a, b) { return timeToMin(a.start) < timeToMin(b.end) && timeToMin(a.end) > timeToMin(b.start); }
function addWeeks(dateStr, n) {
  const d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + n * 7);
  return d.toISOString().split("T")[0];
}
function toGCalDateTime(date, time) { return `${date}T${time}:00`; }

function parseCalendarEvent(event) {
  const parts    = (event.summary || "").split(/ [—–-] /);
  const title    = parts[0] || event.summary;
  const room     = ROOMS.find(r => r.name === parts[1]);
  const nameMatch = (event.description || "").match(/Booked by (.+) via RoomBook/);
  const name     = nameMatch ? nameMatch[1] : "Unknown";
  const tz       = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const startDT  = new Date(event.start.dateTime);
  const endDT    = new Date(event.end.dateTime);
  return {
    id:           event.id,
    roomId:       room?.id,
    date:         startDT.toLocaleDateString("en-CA", { timeZone: tz }),
    start:        startDT.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit" }),
    end:          endDT.toLocaleTimeString("en-GB",   { timeZone: tz, hour: "2-digit", minute: "2-digit" }),
    name, title, recurringId: null, fromCalendar: true,
    creatorEmail: event.creator?.email || null,
  };
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [calendarEvents, setCalendarEvents] = React.useState([]);
  const [calLoading,     setCalLoading]     = React.useState(false);
  const [debugInfo,      setDebugInfo]      = React.useState("");
  const [view,           setView]           = React.useState("grid");
  const [selectedDate,   setSelectedDate]   = React.useState(todayStr());
  const [modal,          setModal]          = React.useState(null);
  const [editTarget,     setEditTarget]     = React.useState(null);
  const [form,           setForm]           = React.useState({ name: "", title: "", start: "09:30", end: "10:30", recurring: false, weeks: 4, addToPersonal: true });
  const [formErr,        setFormErr]        = React.useState("");
  const [submitting,     setSubmitting]     = React.useState(false);  // prevents double-submit
  const [toast,          setToast]          = React.useState(null);
  const [cancelTarget,   setCancelTarget]   = React.useState(null);
  const [cancelMode,     setCancelMode]     = React.useState("single");
  const [accessToken,    setAccessToken]    = React.useState(null);
  const [userEmail,      setUserEmail]      = React.useState(null);
  const [isMobile,       setIsMobile]       = React.useState(window.innerWidth < 640);

  const tokenRef     = React.useRef(null);  // mirrors accessToken for use inside async fns
  const tokenClient  = React.useRef(null);
  const fetchingRef  = React.useRef(false); // prevents concurrent calendar fetches
  const pendingRef   = React.useRef(null);

  // Keep tokenRef in sync with state so async callbacks always use the latest token
  React.useEffect(() => { tokenRef.current = accessToken; }, [accessToken]);

  // Mobile resize listener
  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);

  // Auto-refresh every 60 seconds — fetchingRef prevents overlapping requests
  React.useEffect(() => {
    if (!accessToken) return;
    const id = setInterval(() => fetchCalendarEvents(), 60000);
    return () => clearInterval(id);
  }, [accessToken]);

  // Init Google OAuth + auto-login from cookie
  React.useEffect(() => {
    const interval = setInterval(() => {
      if (!window.google?.accounts) return;
      clearInterval(interval);

      tokenClient.current = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (!resp.access_token) return;

          // Get user email — fall back to cookie if the network call fails
          let email = "";
          try {
            const info = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
              headers: { Authorization: `Bearer ${resp.access_token}` },
            }).then(r => r.json());
            email = info.email || "";
          } catch {}
          if (!email) email = getCookie("rb_email") || "";

          // Block non-company accounts (only if we successfully resolved an email)
          if (email && !email.endsWith(`@${ALLOWED_DOMAIN}`)) {
            showToast(`Access denied: ${email} is not a @${ALLOWED_DOMAIN} account.`, "error");
            deleteCookie("rb_email");
            return;
          }

          tokenRef.current = resp.access_token;
          setAccessToken(resp.access_token);
          if (email) { setUserEmail(email); setCookie("rb_email", email, 30); }
          fetchCalendarEvents(resp.access_token);
          if (pendingRef.current) {
            addToGCal(pendingRef.current, resp.access_token, true);
            pendingRef.current = null;
          }
        },
      });

      // Silently re-auth from saved cookie — no popup if consent already granted
      const saved = getCookie("rb_email");
      if (saved) tokenClient.current.requestAccessToken({ prompt: "", hint: saved });
    }, 300);
    return () => clearInterval(interval);
  }, []);

  // ── Calendar API wrapper — detects expired tokens (HTTP 401) ────────────
  async function calFetch(url, options = {}) {
    const tok = options._token || tokenRef.current;
    const res = await fetch(url, {
      ...options,
      headers: { Authorization: `Bearer ${tok}`, ...options.headers },
    });
    if (res.status === 401) {
      // Token expired — silently get a new one using the saved cookie (no popup)
      const saved = getCookie("rb_email");
      if (saved && tokenClient.current) {
        tokenClient.current.requestAccessToken({ prompt: "", hint: saved });
      } else {
        setAccessToken(null); tokenRef.current = null;
        setUserEmail(null); setCalendarEvents([]);
        deleteCookie("rb_email");
        showToast("Session expired. Please sign in again.", "info");
      }
      return null;
    }
    if (res.status === 403) {
      showToast("You don't have access to the shared calendar yet. Ask Anna to add your email.", "info");
      return null;
    }
    return res;
  }

  // ── Fetch all bookings from the shared calendar ──────────────────────────
  async function fetchCalendarEvents(token) {
    // Prevent concurrent fetches
    if (fetchingRef.current) return;
    fetchingRef.current = true;
    const tok = token || tokenRef.current;
    if (!tok) { fetchingRef.current = false; return; }
    setCalLoading(true);
    try {
      const tMin = new Date(Date.now() - 30  * 864e5).toISOString();
      const tMax = new Date(Date.now() + 365 * 864e5).toISOString();
      const url  = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&maxResults=2500`;
      const res  = await calFetch(url, { _token: tok });
      if (!res) { setDebugInfo("fetch returned null (401/403 — check token/access)"); fetchingRef.current = false; setCalLoading(false); return; }
      const data = await res.json();
      if (!res.ok) {
        const msg = `HTTP ${res.status}: ${data?.error?.message || "unknown"}`;
        setDebugInfo(msg);
        showToast(`Calendar error — ${msg}`, "error");
        fetchingRef.current = false; setCalLoading(false); return;
      }
      const rawCount = (data.items || []).length;
      const parsed = (data.items || [])
        .filter(e => e.summary && e.start?.dateTime)
        .map(parseCalendarEvent)
        .filter(b => b.roomId);
      setCalendarEvents(parsed);
      setDebugInfo(`API: ${rawCount} raw → ${parsed.length} matched rooms`);
    } catch {
      showToast("Failed to load bookings. Check your connection.", "info");
    }
    setCalLoading(false);
    fetchingRef.current = false;
  }

  // ── Write bookings to Google Calendar ───────────────────────────────────
  async function addToGCal(bookingsList, token, addPersonal) {
    const tok = token || tokenRef.current;
    try {
      for (const b of bookingsList) {
        const room  = ROOMS.find(r => r.id === b.roomId);
        const event = {
          summary:     `${b.title} — ${room.name}`,
          description: `Booked by ${b.name} via RoomBook`,
          start: { dateTime: toGCalDateTime(b.date, b.start), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
          end:   { dateTime: toGCalDateTime(b.date, b.end),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        };
        // Add to shared room calendar (always)
        const sharedRes = await calFetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`,
          { _token: tok, method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(event) }
        );
        if (!sharedRes) return; // 401 handled inside calFetch
        if (!sharedRes.ok) throw new Error(`Calendar API error: ${sharedRes.status}`);

        // Also add to the user's personal calendar if requested
        if (addPersonal) {
          await calFetch(
            "https://www.googleapis.com/calendar/v3/calendars/primary/events",
            { _token: tok, method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...event, summary: `📍 ${event.summary}` }) }
          );
        }
      }
      showToast(addPersonal ? "Booked & saved to your calendar! 📅" : "Room booked!", "success");
      await fetchCalendarEvents(tok);
    } catch (err) {
      showToast(`Booking failed: ${err.message}`, "info");
    }
  }

  function connectGCal() {
    if (!tokenClient.current) { showToast("Google not ready yet, try again.", "info"); return; }
    tokenClient.current.requestAccessToken();
  }

  function signOut() {
    setAccessToken(null); tokenRef.current = null;
    setUserEmail(null); setCalendarEvents([]);
    deleteCookie("rb_email");
  }

  // ── Booking helpers ──────────────────────────────────────────────────────
  function dayBookings(roomId) {
    return calendarEvents.filter(b => b.roomId === roomId && b.date === selectedDate);
  }

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 4000);
  }

  function openBook(roomId, startOverride) {
    const start    = startOverride || "09:30";
    const startIdx = HOURS.findIndex(h => h.value === start);
    const end      = HOURS[Math.min(startIdx + 4, HOURS.length - 1)].value;
    setForm({ name: "", title: "", start, end, recurring: false, weeks: 4, addToPersonal: true });
    setFormErr(""); setSubmitting(false); setEditTarget(null); setModal({ roomId });
  }

  function openEdit(b) {
    setForm({ name: b.name, title: b.title, start: b.start, end: b.end, recurring: false, weeks: 4, addToPersonal: false });
    setFormErr(""); setSubmitting(false); setEditTarget(b); setModal({ roomId: b.roomId });
  }

  async function submitBooking() {
    if (submitting) return; // block double-submit
    if (!form.name.trim())  return setFormErr("Please enter your name.");
    if (!form.title.trim()) return setFormErr("Please enter a meeting title.");
    if (timeToMin(form.end) <= timeToMin(form.start)) return setFormErr("End time must be after start time.");

    const dates   = form.recurring ? Array.from({ length: form.weeks }, (_, i) => addWeeks(selectedDate, i)) : [selectedDate];
    const others  = calendarEvents.filter(b => !editTarget || b.id !== editTarget.id);
    const clashes = dates.filter(date => others.some(b => b.roomId === modal.roomId && b.date === date && overlaps(b, form)));
    if (clashes.length > 0) return setFormErr(`Time slot taken on ${clashes.length === 1 ? clashes[0] : clashes.length + " dates"}. Choose a different time.`);

    setSubmitting(true);

    const recurringId = form.recurring ? `rec_${Date.now()}` : null;
    const newBookings = dates.map((date, i) => ({
      id: Date.now() + i, roomId: modal.roomId, date,
      name: form.name.trim(), title: form.title.trim(),
      start: form.start, end: form.end, recurringId,
    }));

    // For edits: CREATE the new event FIRST — if it fails, the old one is untouched
    if (editTarget?.fromCalendar) {
      const tok   = tokenRef.current;
      const room  = ROOMS.find(r => r.id === modal.roomId);
      const event = {
        summary:     `${form.title.trim()} — ${room.name}`,
        description: `Booked by ${form.name.trim()} via RoomBook`,
        start: { dateTime: toGCalDateTime(selectedDate, form.start), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end:   { dateTime: toGCalDateTime(selectedDate, form.end),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      };
      const createRes = await calFetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`,
        { _token: tok, method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(event) }
      );
      if (!createRes || !createRes.ok) {
        showToast("Failed to update booking. Original is unchanged.", "info");
        setSubmitting(false); return;
      }
      // New event created successfully — now safe to delete the old one
      await calFetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${editTarget.id}`,
        { _token: tok, method: "DELETE" }
      );
      setModal(null); setEditTarget(null); setSubmitting(false);
      showToast("Booking updated!");
      await fetchCalendarEvents(tok);
      return;
    }

    setModal(null); setEditTarget(null); setSubmitting(false);
    showToast(form.recurring ? `Booked ${form.weeks} weeks! 🔁` : "Room booked!");
    addToGCal(newBookings, tokenRef.current, form.addToPersonal);
  }

  function openCancel(b) { setCancelTarget(b); setCancelMode("single"); }

  async function cancelBooking() {
    const res = await calFetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${cancelTarget.id}`,
      { method: "DELETE" }
    );
    setCancelTarget(null);
    if (res === null) return; // 401 — handled by calFetch
    if (res.ok || res.status === 204 || res.status === 404) {
      showToast("Booking deleted.", "info");
      await fetchCalendarEvents();
    } else {
      showToast("Failed to delete. Try again.", "info");
    }
  }

  function isAvailableNow(roomId) {
    if (selectedDate !== todayStr()) return true;
    const now = new Date();
    const cur = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    return !dayBookings(roomId).some(b => b.start <= cur && b.end > cur);
  }

  const room         = modal ? ROOMS.find(r => r.id === modal.roomId) : null;
  const formConflict = modal
    ? calendarEvents.find(b => b.roomId === modal.roomId && b.date === selectedDate && overlaps(b, form) && (!editTarget || b.id !== editTarget.id))
    : null;
  const totalToday   = calendarEvents.filter(b => b.date === selectedDate).length;

  // ── Render ────────────────────────────────────────────────────────────────

  // Gate: nothing visible until signed in with a company account
  if (!accessToken) {
    return (
      <div style={{minHeight:"100vh",background:"#111827",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"sans-serif",padding:24}}>
        <div style={{textAlign:"center",maxWidth:400}}>
          <div style={{width:64,height:64,background:"#6366f1",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 24px"}}>🏢</div>
          <h1 style={{color:"#fff",fontSize:28,fontWeight:800,marginBottom:8}}>RoomBook</h1>
          <p style={{color:"#9ca3af",fontSize:15,marginBottom:32}}>Sign in with your <strong style={{color:"#e5e7eb"}}>@{ALLOWED_DOMAIN}</strong> account to view and book rooms.</p>
          <button onClick={connectGCal} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:12,padding:"14px 32px",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%"}}>
            Sign in with Google
          </button>
          <p style={{color:"#4b5563",fontSize:12,marginTop:16}}>Access restricted to {ALLOWED_DOMAIN} accounts only.</p>
        </div>
        {toast && (
          <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#ef4444",color:"#fff",padding:"12px 24px",borderRadius:40,fontWeight:600,fontSize:14,zIndex:200}}>
            🚫 {toast.msg}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#f8f9fc",fontFamily:"sans-serif"}}>

      {/* Header */}
      <div style={{background:"#111827",padding:isMobile?"12px 16px":"18px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"#6366f1",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏢</div>
          <span style={{color:"#fff",fontWeight:700,fontSize:18}}>RoomBook</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{color:"#4ade80",fontSize:12,fontWeight:600}}>
            {isMobile ? "📅 Connected" : `📅 ${userEmail}`}
          </span>
          {calLoading
            ? <span style={{color:"#9ca3af",fontSize:12}}>Syncing…</span>
            : <button onClick={() => fetchCalendarEvents()} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,background:"#1f2937",color:"#9ca3af"}} title="Refresh">🔄</button>
          }
          <button onClick={signOut} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:"#374151",color:"#9ca3af"}}>Sign out</button>
          {!isMobile && ["grid","timeline"].map(v => (
            <button key={v} onClick={() => setView(v)} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===v?"#6366f1":"#1f2937",color:view===v?"#fff":"#9ca3af"}}>
              {v==="grid"?"🃏 Cards":"📅 Timeline"}
            </button>
          ))}
        </div>
      </div>

      {/* Date bar */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:isMobile?"10px 16px":"14px 28px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontWeight:600,color:"#374151",fontSize:14}}>📆 Date</span>
        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} style={{border:"1.5px solid #e5e7eb",borderRadius:8,padding:"6px 12px",fontSize:14,color:"#111827",cursor:"pointer"}} />
        <button onClick={() => setSelectedDate(todayStr())} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,color:"#6366f1",cursor:"pointer"}}>Today</button>
        {isMobile && ["grid","timeline"].map(v => (
          <button key={v} onClick={() => setView(v)} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:view===v?"#6366f1":"#f3f4f6",color:view===v?"#fff":"#6b7280"}}>
            {v==="grid"?"Cards":"Timeline"}
          </button>
        ))}
        <span style={{marginLeft:"auto",color:"#9ca3af",fontSize:13}}>{totalToday} booking(s)</span>
        {debugInfo && <span style={{color:"#6366f1",fontSize:11,background:"#eef2ff",padding:"2px 8px",borderRadius:6}}>{debugInfo}</span>}
      </div>

      {/* Main content */}
      <div style={{padding:isMobile?"16px":"28px"}}>
        {view === "grid" ? (
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill, minmax(280px, 1fr))",gap:20}}>
            {ROOMS.map(r => {
              const avail = isAvailableNow(r.id);
              const bks   = dayBookings(r.id).sort((a,b) => a.start.localeCompare(b.start));
              return (
                <div key={r.id} style={{background:"#fff",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",overflow:"hidden",border:"1px solid #e5e7eb"}}>
                  <div style={{background:r.color,padding:"22px 22px 18px",color:"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:22,marginBottom:4}}>{r.icon}</div>
                        <div style={{fontSize:18,fontWeight:700}}>{r.name}</div>
                        <div style={{fontSize:13,opacity:0.85,marginTop:2}}>👥 Up to {r.capacity} {r.capacity===1?"person":"people"}</div>
                      </div>
                      <span style={{background:avail?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.25)",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>{avail?"✅ Free":"🔴 Busy"}</span>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:12}}>
                      {r.amenities.map(a => <span key={a} style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:500}}>{a}</span>)}
                    </div>
                  </div>
                  <div style={{padding:"16px 22px"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:8}}>SCHEDULE · 9:30 AM – 6:00 PM</div>
                    {bks.length === 0
                      ? <div style={{color:"#9ca3af",fontSize:13,padding:"8px 0"}}>No bookings yet</div>
                      : bks.map(b => (
                          <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#f9fafb",borderRadius:8,marginBottom:6,border:"1px solid #f3f4f6"}}>
                            <div>
                              <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>{b.title}</div>
                              <div style={{fontSize:12,color:"#9ca3af"}}>{b.name} · {b.start}–{b.end}</div>
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={() => openEdit(b)} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,cursor:"pointer",color:"#3b82f6",fontSize:12,padding:"4px 8px",fontWeight:600}}>Edit</button>
                              <button onClick={() => openCancel(b)} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,cursor:"pointer",color:"#ef4444",fontSize:12,padding:"4px 8px",fontWeight:600}}>Delete</button>
                            </div>
                          </div>
                        ))
                    }
                    <button onClick={() => openBook(r.id)} style={{width:"100%",marginTop:12,padding:"10px",background:r.color,color:"#fff",border:"none",borderRadius:10,fontWeight:600,fontSize:14,cursor:"pointer"}}>+ Book Room</button>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #e5e7eb",overflowX:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"70px repeat(4,1fr)":"100px repeat(4, 1fr)",borderBottom:"2px solid #e5e7eb",minWidth:500}}>
              <div style={{padding:"14px 8px",background:"#f9fafb",fontSize:12,fontWeight:700,color:"#6b7280"}}>TIME</div>
              {ROOMS.map(r => (
                <div key={r.id} style={{padding:"10px 8px",background:r.color,color:"#fff",fontWeight:700,fontSize:isMobile?11:13,textAlign:"center"}}>
                  <div>{r.icon} {isMobile ? r.name.split(" ")[0] : r.name}</div>
                  <div style={{fontSize:10,opacity:0.8,fontWeight:400}}>👥 {r.capacity}</div>
                </div>
              ))}
            </div>
            {HOURS.map((slot, i) => (
              <div key={slot.value} style={{display:"grid",gridTemplateColumns:isMobile?"70px repeat(4,1fr)":"100px repeat(4, 1fr)",borderBottom:i%2===0?"1px solid #f3f4f6":"1px dashed #f3f4f6",minWidth:500}}>
                <div style={{padding:"6px 8px",fontSize:10,color:"#9ca3af",fontWeight:500,background:i%2===0?"#fafafa":"#fff"}}>{slot.label}</div>
                {ROOMS.map(r => {
                  const bk     = dayBookings(r.id).find(b => b.start === slot.value);
                  const isBusy = dayBookings(r.id).some(b => b.start < slot.value && b.end > slot.value);
                  return (
                    <div key={r.id} style={{padding:"3px 4px",background:i%2===0?"#fff":"#fafafa",borderLeft:"1px solid #f3f4f6",minHeight:30}}>
                      {bk && (
                        <div style={{background:r.color,color:"#fff",borderRadius:6,padding:"3px 5px",fontSize:10,fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <div>{bk.title}</div>
                            <div style={{opacity:0.8}}>{bk.name} · –{bk.end}</div>
                          </div>
                          <div style={{display:"flex",gap:2}}>
                            <button onClick={() => openEdit(bk)} style={{background:"rgba(255,255,255,0.25)",border:"none",borderRadius:3,color:"#fff",cursor:"pointer",fontSize:9,padding:"2px 4px"}}>✎</button>
                            <button onClick={() => openCancel(bk)} style={{background:"rgba(0,0,0,0.2)",border:"none",borderRadius:3,color:"#fff",cursor:"pointer",fontSize:9,padding:"2px 4px"}}>✕</button>
                          </div>
                        </div>
                      )}
                      {isBusy && !bk && <div style={{height:"100%",background:`${r.color}20`,borderLeft:`3px solid ${r.color}55`}} />}
                      {!bk && !isBusy && (
                        <button onClick={() => openBook(r.id, slot.value)} style={{background:"none",border:"1px dashed #e5e7eb",borderRadius:6,width:"100%",height:24,cursor:"pointer",color:"#d1d5db",fontSize:9}}>+ Book</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Booking / Edit Modal */}
      {modal && room && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:isMobile?"8px":0}}>
          <div style={{background:"#fff",borderRadius:20,width:isMobile?"100%":"420px",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{background:room.color,padding:"24px 28px",color:"#fff"}}>
              <div style={{fontSize:28,marginBottom:6}}>{room.icon}</div>
              <div style={{fontWeight:700,fontSize:20}}>{editTarget ? "Edit Booking" : `Book ${room.name}`}</div>
              <div style={{fontSize:13,opacity:0.85,marginTop:4}}>👥 {room.capacity} {room.capacity===1?"person":"people"} · {room.amenities.join(", ")}</div>
            </div>
            <div style={{padding:"24px 28px"}}>
              {[["Your Name","name","e.g. Anna Smith"],["Meeting Title","title","e.g. Weekly Standup"]].map(([label,key,ph]) => (
                <div key={key} style={{marginBottom:16}}>
                  <label style={{display:"block",fontWeight:600,fontSize:13,color:"#374151",marginBottom:6}}>{label}</label>
                  <input type="text" placeholder={ph} value={form[key]} onChange={e => setForm(f => ({...f,[key]:e.target.value}))}
                    style={{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:10,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}} />
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                {[["Start Time","start"],["End Time","end"]].map(([label,key]) => (
                  <div key={key}>
                    <label style={{display:"block",fontWeight:600,fontSize:13,color:"#374151",marginBottom:6}}>{label}</label>
                    <select value={form[key]} onChange={e => setForm(f => ({...f,[key]:e.target.value}))}
                      style={{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:10,padding:"10px 14px",fontSize:14}}>
                      {HOURS.map(h => <option key={h.value} value={h.value}>{h.label}</option>)}
                    </select>
                  </div>
                ))}
              </div>
              {formConflict && (
                <div style={{color:"#b45309",fontSize:13,marginBottom:12,background:"#fffbeb",padding:"8px 12px",borderRadius:8,border:"1px solid #fde68a"}}>
                  ⚠️ Conflicts with <strong>{formConflict.title}</strong> by {formConflict.name} ({formConflict.start}–{formConflict.end})
                </div>
              )}
              {!editTarget && (
                <div style={{background:"#f9fafb",borderRadius:12,padding:"14px 16px",marginBottom:12,border:"1.5px solid #e5e7eb"}}>
                  <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                    <input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f,recurring:e.target.checked}))} style={{width:16,height:16,cursor:"pointer"}} />
                    <span style={{fontWeight:600,fontSize:13,color:"#374151"}}>🔁 Repeat weekly</span>
                  </label>
                  {form.recurring && (
                    <div style={{marginTop:12}}>
                      <label style={{display:"block",fontWeight:600,fontSize:12,color:"#6b7280",marginBottom:6}}>Number of weeks</label>
                      <select value={form.weeks} onChange={e => setForm(f => ({...f,weeks:Number(e.target.value)}))}
                        style={{border:"1.5px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,width:"100%"}}>
                        {[2,4,6,8,12,16,26,52].map(w => <option key={w} value={w}>{w} weeks (~{Math.round(w/4.3)} months)</option>)}
                      </select>
                      <div style={{fontSize:12,color:"#9ca3af",marginTop:6}}>Every week from {selectedDate} for {form.weeks} weeks</div>
                    </div>
                  )}
                </div>
              )}
              <div style={{background:"#f0fdf4",borderRadius:12,padding:"12px 16px",marginBottom:16,border:"1.5px solid #bbf7d0"}}>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                  <input type="checkbox" checked={form.addToPersonal} onChange={e => setForm(f => ({...f,addToPersonal:e.target.checked}))} style={{width:16,height:16,cursor:"pointer"}} />
                  <span style={{fontWeight:600,fontSize:13,color:"#15803d"}}>📅 Add to my personal Google Calendar</span>
                </label>
              </div>
              {formErr && <div style={{color:"#ef4444",fontSize:13,marginBottom:12,background:"#fef2f2",padding:"8px 12px",borderRadius:8}}>⚠️ {formErr}</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={() => { setModal(null); setEditTarget(null); }} disabled={submitting}
                  style={{flex:1,padding:"12px",border:"1.5px solid #e5e7eb",borderRadius:10,background:"#fff",fontWeight:600,fontSize:14,cursor:"pointer",color:"#374151"}}>
                  Cancel
                </button>
                <button onClick={submitBooking} disabled={submitting}
                  style={{flex:2,padding:"12px",border:"none",borderRadius:10,background:submitting?"#9ca3af":room.color,color:"#fff",fontWeight:700,fontSize:14,cursor:submitting?"not-allowed":"pointer",transition:"background 0.2s"}}>
                  {submitting ? "Saving…" : editTarget ? "Save Changes" : form.recurring ? `Book ${form.weeks} Weeks 🔁` : "Confirm Booking"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Delete confirmation */}
      {cancelTarget && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:isMobile?"8px":0}}>
          <div style={{background:"#fff",borderRadius:16,padding:28,width:isMobile?"100%":"360px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
            <div style={{fontWeight:700,fontSize:18,marginBottom:8}}>Delete Booking?</div>
            <div style={{color:"#6b7280",fontSize:14,marginBottom:20}}>
              <strong>{cancelTarget.title}</strong> by {cancelTarget.name}<br />{cancelTarget.start}–{cancelTarget.end}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={() => setCancelTarget(null)} style={{flex:1,padding:"11px",border:"1.5px solid #e5e7eb",borderRadius:10,fontWeight:600,cursor:"pointer",background:"#fff"}}>Keep</button>
              <button onClick={cancelBooking} style={{flex:1,padding:"11px",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",background:"#ef4444",color:"#fff"}}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:toast.type==="success"?"#111827":toast.type==="error"?"#ef4444":"#6366f1",color:"#fff",padding:"12px 24px",borderRadius:40,fontWeight:600,fontSize:14,zIndex:200,whiteSpace:"nowrap"}}>
          {toast.type==="success"?"✅":toast.type==="error"?"🚫":"ℹ️"} {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
